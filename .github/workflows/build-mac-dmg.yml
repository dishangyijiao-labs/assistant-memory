name: Build Mac DMG

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Installation

            Download the DMG, open it, and drag **AssistMem** into your Applications folder.

            **First launch:** macOS may block the app because it is not notarized by Apple. To open it:
            1. **Right-click** AssistMem.app → choose **Open** → confirm in the dialog, or
            2. Go to **System Settings → Privacy & Security** → scroll down and click **Open Anyway**

          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') || contains(github.ref, 'rc') }}

  build-mac:
    needs: [create-release]
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Build app bundle
        run: npm run build && npm run desktop:prepare && npx @tauri-apps/cli@latest build --target aarch64-apple-darwin --bundles app --no-sign --ci
        env:
          CI: true

      - name: Ad-hoc sign app bundle
        run: |
          APP="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/AssistMem.app"
          codesign --force --deep --sign - "$APP"
          echo "Signature info:"
          codesign --display --verbose "$APP" 2>&1

      - name: Create DMG
        run: |
          APP="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/AssistMem.app"
          DMG_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle/dmg"
          VERSION=$(node -p "require('./package.json').version")
          DMG_PATH="$DMG_DIR/AssistMem_${VERSION}_aarch64.dmg"

          mkdir -p "$DMG_DIR"

          STAGING=$(mktemp -d)
          cp -R "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create \
            -volname "AssistMem" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$DMG_PATH"

          rm -rf "$STAGING"
          ls -lh "$DMG_DIR/"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: AssistMem-macOS-arm64
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Attach DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') || contains(github.ref, 'rc') }}
