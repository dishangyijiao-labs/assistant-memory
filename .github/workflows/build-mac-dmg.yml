name: Build Mac DMG

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Installation

            ### Option 1 — Shell script (Recommended, no Gatekeeper prompt)
            Open Terminal and run:
            ```bash
            curl -fsSL https://raw.githubusercontent.com/dishangyijiao/assistant-memory/main/install.sh | bash
            ```
            The script downloads and installs AssistMem without triggering macOS Gatekeeper.

            ### Option 2 — Manual DMG
            Download the DMG below, open it, and drag **AssistMem** into your Applications folder.
            Then run in Terminal to remove the Gatekeeper block:
            ```bash
            xattr -r -d com.apple.quarantine /Applications/AssistMem.app
            ```

          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') || contains(github.ref, 'rc') }}

  build-mac:
    needs: [create-release]
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Build app bundle
        run: npm run build && npm run desktop:prepare && npx @tauri-apps/cli@latest build --target aarch64-apple-darwin --bundles app --no-sign --ci
        env:
          CI: true

      - name: Ad-hoc sign app bundle
        run: |
          APP="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/AssistMem.app"
          codesign --force --deep --sign - "$APP"
          echo "Signature info:"
          codesign --display --verbose "$APP" 2>&1

      - name: Create DMG
        run: |
          APP="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/AssistMem.app"
          DMG_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle/dmg"
          VERSION=$(node -p "require('./package.json').version")
          DMG_PATH="$DMG_DIR/AssistMem_${VERSION}_aarch64.dmg"

          mkdir -p "$DMG_DIR"

          STAGING=$(mktemp -d)
          cp -R "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create \
            -volname "AssistMem" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$DMG_PATH"

          rm -rf "$STAGING"
          ls -lh "$DMG_DIR/"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: AssistMem-macOS-arm64
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Attach DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') || contains(github.ref, 'rc') }}

      - name: Update Homebrew Tap
        if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref, 'beta') && !contains(github.ref, 'alpha') && !contains(github.ref, 'rc')
        env:
          REPO_ADMIN_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          DMG_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/AssistMem_${VERSION}_aarch64.dmg"
          SHA256=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')

          git clone https://x-access-token:${REPO_ADMIN_TOKEN}@github.com/dishangyijiao/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/assistmem.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/assistmem.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/assistmem.rb
          git diff --staged --quiet || git commit -m "chore: update AssistMem to v${VERSION}"
          git push
